openapi: 3.0.0
info:
  title: Reserve Unlocker API
  description: API for analyzing Amazon FBA trapped capital and DD+7 bottlenecks.
  version: 1.0.0
servers:
  - url: https://your-domain.vercel.app/api
paths:
  /analyze-settlement:
    post:
      summary: Process settlement report data
      description: Accepts JSON-formatted settlement report data to calculate trapped vs. available reserves.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: array
                  items:
                    type: object
                    properties:
                      total: { type: number }
                      reserve_amount: { type: number }
      responses:
        '200':
          description: Returns calculated reserve metrics
          content:
            application/json:
              schema:
                type: object
                properties:
                  trapped_capital: { type: number }
                  available_capital: { type: number }
                  velocity_score: { type: number }
paths:
  /velocity-projection:
    post:
      summary: Project future capital availability
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                historicalVelocity: { type: number }
                currentReserve: { type: number }
  /fee-nullifier:
    post:
      summary: Compare cost of advance vs waiting
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                amount: { type: number }
                factorRate: { type: number }
